<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sanskar Singh — Software Engineer</title>
    <script type="text/javascript">
      // SPA fallback for GitHub Pages (single-page apps with client-side routing).
      // Takes the 404'd path and redirects to index with the path preserved as a query,
      // where a matching decoder in index.html restores it. pathSegmentsToKeep=0 for a
      // user/organization page served from the domain root.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
